<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Fly for Peace</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="../assets/logo.png" alt="Fly for Peace" style="max-width: 120px; object-fit: contain;">
            <h2>Admin Portal</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="flyforpeaceinfo@gmail.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn" id="login-btn">Secure Login</button>
                <div id="error-msg" class="error-msg">Invalid credentials. Please try again.</div>
            </form>
        </div>
    </div>

    <!-- Modular JS -->
    <script type="module">
        import { auth, signInWithEmailAndPassword, onAuthStateChanged } from '../js/firebase-config.js';

        // Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');
            
            btn.innerText = "Authenticating...";
            errorMsg.style.display = 'none';

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = 'dashboard.html';
            } catch(error) {
                btn.innerText = "Secure Login";
                errorMsg.style.display = 'block';
                console.error(error);
            }
        });
    </script>
</body>
</html>
